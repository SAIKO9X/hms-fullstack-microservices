# SonarCloud Configuration for HMS Backend
# This file provides project-level configuration for SonarCloud analysis
# Alternative to passing properties via Maven command line

# Project identification
sonar.projectKey=hms-backend
sonar.organization=<your-sonarcloud-org>

# Project metadata
sonar.projectName=HMS Backend - Hospital Management System
sonar.projectVersion=1.0.0-SNAPSHOT

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java version
sonar.java.source=21
sonar.java.target=21

# Coverage reporting
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Exclusions from analysis
sonar.exclusions=\
  **/config/**,\
  **/*Application.java,\
  **/entities/**,\
  **/dto/**,\
  **/enums/**,\
  **/exceptions/**,\
  **/mapper/**

# Exclusions from coverage calculation
sonar.coverage.exclusions=\
  **/config/**,\
  **/*Application.java,\
  **/entities/**,\
  **/dto/**,\
  **/enums/**,\
  **/exceptions/**,\
  **/mapper/**

# Encoding
sonar.sourceEncoding=UTF-8

# Multi-module configuration
# SonarCloud will automatically detect Maven modules
sonar.modules=user,gateway,profile,appointment,eureka-server,pharmacy,media,chat,notification,common-lib,billing,audit

